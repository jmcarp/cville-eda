<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlottesville Area Development Projects — Map</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    /* Override body padding for full-bleed map */
    body { padding: 0; }

    .navbar .stats {
      font-size: 0.875rem;
      color: #666;
    }

    #map {
      position: absolute;
      top: 52px;
      bottom: 0;
      left: 0;
      right: 0;
    }
    .loading-overlay {
      position: absolute;
      top: 52px;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 245, 245, 0.8);
      z-index: 999;
      font-size: 1rem;
      color: #888;
    }
    .legend {
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      font-size: 0.75rem;
      line-height: 1.8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    /* Filter panel */
    .filter-panel {
      position: absolute;
      top: 62px;
      right: 10px;
      z-index: 1000;
    }
    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: white;
      border: none;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      color: #333;
    }
    .filter-toggle:hover {
      background: #f5f5f5;
    }
    .filter-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: #0066cc;
      color: white;
      border-radius: 9px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .filter-body {
      margin-top: 6px;
      background: white;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      padding: 12px;
      width: 220px;
    }
    .filter-body .filter-group {
      margin-bottom: 10px;
    }
    .filter-body .filter-group:last-child {
      margin-bottom: 0;
    }
    .filter-body label.filter-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .filter-body .multi-select-button {
      width: 100%;
      font-size: 0.8rem;
      font-family: inherit;
      color: #333;
    }
    .filter-body .multi-select-option {
      font-size: 0.8rem;
    }
    .filter-body .multi-select-dropdown {
      z-index: 1100;
    }
    .reset-btn {
      display: block;
      width: 100%;
      padding: 6px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      color: #666;
    }
    .reset-btn:hover {
      background: #f5f5f5;
      color: #333;
    }
  </style>
</head>
<body>
  <div x-data="mapApp()" x-init="init()">
    <nav class="navbar">
      <a class="site-title" href="./">Cville Area Development</a>
      <div class="spacer"></div>
      <span class="stats" x-cloak x-show="totalFeatureCount > 0">
        <template x-if="activeFilterCount > 0">
          <span x-text="visibleFeatureCount.toLocaleString() + ' of ' + totalFeatureCount.toLocaleString() + ' parcels shown'"></span>
        </template>
        <template x-if="activeFilterCount === 0">
          <span x-text="totalFeatureCount.toLocaleString() + ' parcels mapped'"></span>
        </template>
      </span>
      <a class="active" href="map.html">Map</a>
      <a href="cville/">Charlottesville</a>
      <a href="albemarle/">Albemarle</a>
    </nav>

    <template x-if="loading">
      <div class="loading-overlay">Loading parcels...</div>
    </template>

    <template x-if="error">
      <div class="loading-overlay" x-text="error" style="color: #cc0000;"></div>
    </template>

    <div id="map"></div>

    <!-- Filter panel -->
    <div class="filter-panel"
         x-cloak x-show="totalFeatureCount > 0"
         @click.stop @dblclick.stop @mousedown.stop @wheel.stop>

      <button class="filter-toggle" @click="filterOpen = !filterOpen">
        Filters
        <template x-if="activeFilterCount > 0">
          <span class="filter-badge" x-text="activeFilterCount"></span>
        </template>
      </button>

      <div class="filter-body" x-show="filterOpen" x-cloak>
        <!-- Jurisdiction -->
        <div class="filter-group">
          <label class="filter-label">Jurisdiction</label>
          <div class="multi-select" @click.outside="dropdowns.jurisdiction = false">
            <button type="button" class="multi-select-button" @click="dropdowns.jurisdiction = !dropdowns.jurisdiction">
              <span x-text="filters.jurisdictions.length ? filters.jurisdictions.length + ' selected' : 'All'"></span>
              <span class="arrow">&#x25BC;</span>
            </button>
            <div class="multi-select-dropdown" x-show="dropdowns.jurisdiction" x-cloak>
              <template x-for="j in uniqueJurisdictions" :key="j">
                <label class="multi-select-option">
                  <input type="checkbox" :value="j" :checked="filters.jurisdictions.includes(j)" @change="toggleFilter('jurisdictions', j)">
                  <span x-text="j"></span>
                </label>
              </template>
            </div>
          </div>
        </div>

        <!-- Year -->
        <div class="filter-group">
          <label class="filter-label">Year</label>
          <div class="multi-select" @click.outside="dropdowns.year = false">
            <button type="button" class="multi-select-button" @click="dropdowns.year = !dropdowns.year">
              <span x-text="filters.years.length ? filters.years.length + ' selected' : 'All'"></span>
              <span class="arrow">&#x25BC;</span>
            </button>
            <div class="multi-select-dropdown" x-show="dropdowns.year" x-cloak>
              <template x-for="y in uniqueYears" :key="y">
                <label class="multi-select-option">
                  <input type="checkbox" :value="y" :checked="filters.years.includes(y)" @change="toggleFilter('years', y)">
                  <span x-text="y"></span>
                </label>
              </template>
            </div>
          </div>
        </div>

        <!-- Type -->
        <div class="filter-group">
          <label class="filter-label">Type</label>
          <div class="multi-select" @click.outside="dropdowns.type = false">
            <button type="button" class="multi-select-button" @click="dropdowns.type = !dropdowns.type">
              <span x-text="filters.types.length ? filters.types.length + ' selected' : 'All'"></span>
              <span class="arrow">&#x25BC;</span>
            </button>
            <div class="multi-select-dropdown" x-show="dropdowns.type" x-cloak>
              <template x-for="t in uniqueTypes" :key="t">
                <label class="multi-select-option">
                  <input type="checkbox" :value="t" :checked="filters.types.includes(t)" @change="toggleFilter('types', t)">
                  <span x-text="t"></span>
                </label>
              </template>
            </div>
          </div>
        </div>

        <!-- Status -->
        <div class="filter-group">
          <label class="filter-label">Status</label>
          <div class="multi-select" @click.outside="dropdowns.status = false">
            <button type="button" class="multi-select-button" @click="dropdowns.status = !dropdowns.status">
              <span x-text="filters.statuses.length ? filters.statuses.length + ' selected' : 'All'"></span>
              <span class="arrow">&#x25BC;</span>
            </button>
            <div class="multi-select-dropdown" x-show="dropdowns.status" x-cloak>
              <template x-for="s in uniqueStatuses" :key="s">
                <label class="multi-select-option">
                  <input type="checkbox" :value="s" :checked="filters.statuses.includes(s)" @change="toggleFilter('statuses', s)">
                  <span x-text="s"></span>
                </label>
              </template>
            </div>
          </div>
        </div>

        <button class="reset-btn"
                x-show="activeFilterCount > 0"
                @click="resetFilters()">
          Reset filters
        </button>
      </div>
    </div>
  </div>

  <script>
    function mapApp() {
      return {
        loading: true,
        error: null,
        totalFeatureCount: 0,
        visibleFeatureCount: 0,
        map: null,
        allFeatures: [],
        geojsonLayer: null,
        planIdToLayers: {},
        highlightedLayers: [],

        filterOpen: false,
        filters: { jurisdictions: [], years: [], types: [], statuses: [] },
        dropdowns: { jurisdiction: false, year: false, type: false, status: false },

        uniqueJurisdictions: [],
        uniqueYears: [],
        uniqueTypes: [],
        uniqueStatuses: [],

        get activeFilterCount() {
          return this.filters.jurisdictions.length +
                 this.filters.years.length +
                 this.filters.types.length +
                 this.filters.statuses.length;
        },

        statusColor(status) {
          if (!status) return '#6c757d';
          const s = status.toLowerCase();
          // Albemarle title-case statuses
          if (s === 'approved' || s === 'complete') return '#28a745';
          if (s === 'in review' || s === 'submitted' || s === 'submitted - online') return '#ffc107';
          if (s === 'fees paid' || s === 'fees due') return '#17a2b8';
          if (s === 'on hold' || s.includes('deferred')) return '#e91e63';
          // Cville uppercase statuses
          if (s === 'approvedcl' || s === 'underconst') return '#28a745';
          if (s === 'review' || s === 'plancomm' || s === 'resubmit' || s === 'comments' || s === 'applied') return '#ffc107';
          return '#6c757d';
        },

        init() {
          this.map = L.map('map').setView([38.03, -78.48], 10);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
          }).addTo(this.map);

          this.addLegend();
          this.loadParcels();
        },

        addLegend() {
          const legend = L.control({ position: 'bottomright' });
          legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            const items = [
              ['#28a745', 'Approved / Complete'],
              ['#ffc107', 'In Review / Submitted'],
              ['#17a2b8', 'Fees Paid / Due'],
              ['#e91e63', 'On Hold / Deferred'],
              ['#6c757d', 'Denied / Void / Other'],
            ];
            div.innerHTML = items.map(([color, label]) =>
              `<div class="legend-item">
                <span class="legend-swatch" style="background:${color}"></span>
                ${label}
              </div>`
            ).join('');
            return div;
          };
          legend.addTo(this.map);
        },

        async loadParcels() {
          try {
            // Load both GeoJSON files in parallel
            const [cvilleResp, albResp] = await Promise.all([
              fetch('cville/parcels.geojson').catch(() => null),
              fetch('albemarle/parcels.geojson').catch(() => null),
            ]);

            let loaded = 0;

            if (cvilleResp && cvilleResp.ok) {
              const cvilleData = await cvilleResp.json();
              for (const f of cvilleData.features) {
                f.properties.jurisdiction = 'Charlottesville';
                this.allFeatures.push(f);
              }
              loaded++;
            }

            if (albResp && albResp.ok) {
              const albData = await albResp.json();
              for (const f of albData.features) {
                f.properties.jurisdiction = 'Albemarle';
                this.allFeatures.push(f);
              }
              loaded++;
            }

            if (loaded === 0) {
              throw new Error('No parcel data found. Run: make build');
            }

            this.totalFeatureCount = this.allFeatures.length;
            this.extractFilterValues();
            this.loadFromUrl();
            this.renderLayer();

            this.loading = false;
          } catch (e) {
            this.error = e.message;
            this.loading = false;
          }
        },

        extractFilterValues() {
          const jurisdictions = new Set();
          const years = new Set();
          const types = new Set();
          const statuses = new Set();

          for (const feature of this.allFeatures) {
            jurisdictions.add(feature.properties.jurisdiction);
            for (const p of feature.properties.projects || []) {
              if (p.application_date) {
                const year = p.application_date.substring(0, 4);
                if (year >= '2000') years.add(year);
              }
              if (p.plan_type) types.add(p.plan_type);
              if (p.status) statuses.add(p.status);
            }
          }

          this.uniqueJurisdictions = [...jurisdictions].sort();
          this.uniqueYears = [...years].sort().reverse();
          this.uniqueTypes = [...types].sort();
          this.uniqueStatuses = [...statuses].sort();
        },

        projectMatchesFilters(p) {
          if (this.filters.years.length > 0) {
            const year = (p.application_date || '').substring(0, 4);
            if (!this.filters.years.includes(year)) return false;
          }
          if (this.filters.types.length > 0) {
            if (!this.filters.types.includes(p.plan_type)) return false;
          }
          if (this.filters.statuses.length > 0) {
            if (!this.filters.statuses.includes(p.status)) return false;
          }
          return true;
        },

        featureMatchesFilters(feature) {
          if (this.filters.jurisdictions.length > 0) {
            if (!this.filters.jurisdictions.includes(feature.properties.jurisdiction)) return false;
          }
          const projects = feature.properties.projects || [];
          if (this.filters.years.length + this.filters.types.length + this.filters.statuses.length === 0) {
            return true;
          }
          return projects.some(p => this.projectMatchesFilters(p));
        },

        matchingProjects(feature) {
          const projects = feature.properties.projects || [];
          const projectFilterActive = this.filters.years.length + this.filters.types.length + this.filters.statuses.length > 0;
          if (!projectFilterActive) return projects;
          return projects.filter(p => this.projectMatchesFilters(p));
        },

        renderLayer() {
          if (this.geojsonLayer) {
            this.map.removeLayer(this.geojsonLayer);
          }

          const self = this;
          let visible = 0;
          this.planIdToLayers = {};
          this.clearHighlights();

          const geojsonData = { type: 'FeatureCollection', features: this.allFeatures };

          this.geojsonLayer = L.geoJSON(geojsonData, {
            filter(feature) {
              if (self.featureMatchesFilters(feature)) {
                visible++;
                return true;
              }
              return false;
            },
            style(feature) {
              const color = self.statusColor(feature.properties.status);
              return {
                color: color,
                fillColor: color,
                fillOpacity: 0.5,
                weight: 2,
              };
            },
            onEachFeature(feature, layer) {
              const props = feature.properties;
              const projects = self.matchingProjects(feature);
              const jurisdiction = props.jurisdiction;
              const tableBase = jurisdiction === 'Charlottesville' ? 'cville' : 'albemarle';

              const html = projects.map((p, i) => {
                const addr = (p.addresses && p.addresses[0]) || '';
                const name = p.project_name || addr || 'Unknown';
                const showAddr = addr && addr !== name;
                const units = p.units != null ? p.units + ' units' : '';
                const searchTerm = addr || props.pin || '';
                const searchParam = encodeURIComponent(searchTerm);
                const sep = i > 0 ? '<hr style="margin:8px 0;border:0;border-top:1px solid #ddd">' : '';
                const searchKey = jurisdiction === 'Charlottesville' ? 'address' : 'search';

                return `${sep}<div>
                  <strong>${self.esc(name)}</strong><br>
                  ${showAddr ? self.esc(addr) + '<br>' : ''}
                  ${units ? units + '<br>' : ''}
                  <em>${self.esc(p.status)}</em> &middot; ${self.esc(p.plan_type)}<br>
                  <span style="font-size:0.8em;color:#666">${self.esc(jurisdiction)}</span>
                  ${searchTerm ? ` &middot; <a href="${tableBase}/?${searchKey}=${searchParam}" style="font-size:0.85em">View in table &rarr;</a>` : ''}
                </div>`;
              }).join('');

              layer.bindPopup(`<div style="min-width:180px">${html}</div>`);

              // Index this layer by plan_id for sibling highlighting
              for (const p of props.projects || []) {
                if (!p.plan_id) continue;
                if (!self.planIdToLayers[p.plan_id]) self.planIdToLayers[p.plan_id] = [];
                self.planIdToLayers[p.plan_id].push(layer);
              }

              layer.on('click', () => {
                self.clearHighlights();
                // Find all sibling layers sharing any project with this parcel
                const siblingSet = new Set();
                for (const p of (props.projects || [])) {
                  if (!p.plan_id) continue;
                  for (const sibling of (self.planIdToLayers[p.plan_id] || [])) {
                    if (sibling !== layer) siblingSet.add(sibling);
                  }
                }
                for (const sibling of siblingSet) {
                  sibling.setStyle({ weight: 4, dashArray: '6 4', opacity: 1 });
                  sibling.bringToFront();
                  self.highlightedLayers.push(sibling);
                }
              });

              layer.on('popupclose', () => self.clearHighlights());
            }
          }).addTo(this.map);

          this.visibleFeatureCount = visible;
        },

        toggleFilter(name, value) {
          const idx = this.filters[name].indexOf(value);
          if (idx === -1) {
            this.filters[name].push(value);
          } else {
            this.filters[name].splice(idx, 1);
          }
          this.renderLayer();
          this.updateUrl();
        },

        resetFilters() {
          this.filters.jurisdictions = [];
          this.filters.years = [];
          this.filters.types = [];
          this.filters.statuses = [];
          this.renderLayer();
          this.updateUrl();
        },

        loadFromUrl() {
          const params = new URLSearchParams(window.location.search);
          if (params.has('jurisdictions')) this.filters.jurisdictions = params.get('jurisdictions').split(',').filter(Boolean);
          if (params.has('years')) this.filters.years = params.get('years').split(',').filter(Boolean);
          if (params.has('types')) this.filters.types = params.get('types').split(',').filter(Boolean);
          if (params.has('statuses')) this.filters.statuses = params.get('statuses').split(',').filter(Boolean);
          if (this.activeFilterCount > 0) this.filterOpen = true;
        },

        updateUrl() {
          const params = new URLSearchParams();
          if (this.filters.jurisdictions.length) params.set('jurisdictions', this.filters.jurisdictions.join(','));
          if (this.filters.years.length) params.set('years', this.filters.years.join(','));
          if (this.filters.types.length) params.set('types', this.filters.types.join(','));
          if (this.filters.statuses.length) params.set('statuses', this.filters.statuses.join(','));

          const url = params.toString() ? `?${params.toString()}` : window.location.pathname;
          window.history.replaceState({}, '', url);
        },

        clearHighlights() {
          if (this.geojsonLayer) {
            for (const layer of this.highlightedLayers) {
              this.geojsonLayer.resetStyle(layer);
            }
          }
          this.highlightedLayers = [];
        },

        esc(str) {
          if (!str) return '';
          const d = document.createElement('div');
          d.textContent = str;
          return d.innerHTML;
        }
      };
    }
  </script>
</body>
</html>
